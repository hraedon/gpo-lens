<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}gpo-lens{% endblock %}</title>
    <link rel="icon" href="{{ url_for('static', path='favicon.svg') }}" type="image/svg+xml">
    <link rel="stylesheet" href="{{ url_for('static', path='css/tokens.css') }}">
    <script src="{{ url_for('static', path='theme.js') }}"></script>
</head>
<body>
{% set path = request.scope.get('path', '/') %}
<div class="gp-app">
    <header class="gp-topbar">
        <a href="{{ url_for('home') }}" class="gp-wordmark" aria-label="gpo-lens home">
            <span class="gp-mark" aria-hidden="true">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="9" y="2" width="6" height="5" rx="1"/>
                    <rect x="2.5" y="17" width="6" height="5" rx="1"/>
                    <rect x="15.5" y="17" width="6" height="5" rx="1"/>
                    <path d="M12 7v4M12 11H5.5v6M12 11h6.5v6"/>
                </svg>
            </span>
            <span class="gp-name">gpo<span class="muted">·</span>lens</span>
            <span class="gp-ver">v{{ app_version }}</span>
        </a>
        <nav class="gp-nav" aria-label="Primary">
            <a href="{{ url_for('home') }}" {% if path == '/' %}class="active"{% endif %}>Dashboard</a>
            <a href="{{ url_for('ou_list') }}" {% if path.startswith('/ou') %}class="active"{% endif %}>Directory</a>
            <a href="{{ url_for('changelog') }}" {% if path.startswith('/changelog') %}class="active"{% endif %}>Changelog</a>
            <a href="{{ url_for('baseline_get') }}" {% if path.startswith('/baseline') %}class="active"{% endif %}>Baseline</a>
            <a href="{{ url_for('ask_get') }}" {% if path.startswith('/ask') %}class="active"{% endif %}>Ask</a>
            <a href="{{ url_for('ingest_get') }}" {% if path.startswith('/ingest') %}class="active"{% endif %}>Ingest</a>
        </nav>
        <span class="gp-spacer"></span>
        <button class="gp-iconbtn" id="theme-toggle" type="button" title="Toggle light / dark" aria-label="Toggle light or dark theme">
            <svg id="theme-icon-dark" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                <circle cx="12" cy="12" r="4.5"/>
                <path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/>
            </svg>
            <svg id="theme-icon-light" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z"/>
            </svg>
        </button>
    </header>
    {% block breadcrumb %}{% endblock %}
    <main class="gp-page">
        <div class="gp-wrap">
            {% block content %}{% endblock %}
        </div>
    </main>
</div>
</body>
</html>
