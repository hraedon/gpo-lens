[project]
name = "gpo-lens"
version = "0.0.1"
description = "Local-first, read-only Group Policy analysis: searchable settings, conflict/topology analysis, baseline comparison, hygiene/security scans, and a change log over time."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "hraedon" }]
# Slice 1 (ingest + queries + CLI) is intentionally stdlib-only:
# xml.etree.ElementTree, json, sqlite3, argparse. No runtime deps.
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=8.3",
    "pytest-cov>=6.0",
    "ruff>=0.7",
    "mypy>=1.13",
]
# Web/UI layer (later tier) will add: fastapi, uvicorn[standard], jinja2.

[project.scripts]
gpo-lens = "gpo_lens.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/gpo_lens"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
markers = [
    "samples: tests that require the local sample exports in samples/ (skipped if absent)",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.mypy]
python_version = "3.12"
strict = true
